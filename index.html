<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
    <title>To do Classes</title>
</head>

<body>

    <h1>TODO APP</h1>

    <div class="container">
        <input type="text" class="search-input" placeholder="Добавьте новую задачу" data-add-todo-input>

        <div class="todo-stats">
            Осталось задач: <span data-todo-stats>0</span>
        </div>

        <button class="todo-btn" data-todo-btn>Добавить задачу</button>
        <h1 class="no-tasks" data-no-tasks>Задач пока нет...</h1>

        <div class="todo-container" data-add-todo-container></div>


        <button class="remove-all" data-remove-all>Удалить все задачи</button>

    </div>


</body>

</html>
